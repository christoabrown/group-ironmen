version: "3.8"
services:
  frontend:
    build:
      context: ./site
      dockerfile: Dockerfile
    environment:
      - HOST_URL=${HOST_URL}
    restart: always
    container_name: frontend
    ports:
      - 4000:4000 # replace this if using a docker-compatible reverse proxy like traefik
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_HOST=${PG_HOST}
      - PG_PORT=${PG_PORT}
      - PG_DB=${PG_DB}
      - BACKEND_SECRET=${BACKEND_SECRET}
    restart: always
    depends_on:
      - "postgres"
    container_name: backend
  postgres:
    image: postgres
    restart: always
    container_name: postgres
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    volumes:
      - ./pg-data:/var/lib/postgresql/data # change the left-hand side of : to the path you prefer the DB to store the data in
      - ./server/src/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql # change the left-hand side of the : to the path that contains the schema.sql
  nginx:
    image: nginx
    depends_on:
      - "backend"
    ports:
      - 3333:3333
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf


