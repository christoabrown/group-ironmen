name: Validate Cache Data

on:
  pull_request:
    branches: [master]
    paths:
      - 'site/public/data/**'
      - 'site/public/icons/items/**'
      - 'site/public/map/**'

jobs:
  validate:
    if: github.head_ref == 'cache-update' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run cache validation tests
        run: npm test -- cache-data.test.js
