<div class="skills-graphs__control-container">
  <button class="skills-graphs__refresh men-button">Refresh</button>

  <div class="skills-graphs__period-toggle">
    <button class="men-button small skills-graphs__period-btn active" data-period="Day">24H</button>
    <button class="men-button small skills-graphs__period-btn" data-period="Week">7D</button>
    <button class="men-button small skills-graphs__period-btn" data-period="Month">30D</button>
    <button class="men-button small skills-graphs__period-btn" data-period="Year">1Y</button>
  </div>

  <div class="men-control-container rsborder-tiny rsbackground rsbackground-hover">
    <select class="skills-graphs__skill-select">
      ${skillNames.map((skillName) => `
      <option value="${skillName}">${skillName}</option>
      `).join('')}
    </select>
  </div>
</div>
<div class="skills-graphs__chart-container rsborder rsbackground"></div>
